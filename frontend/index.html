<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RepoMind AI</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    max-width: 780px;
    margin: 60px auto;
    background: #0d1117;
    color: #c9d1d9;
    padding: 0 20px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .header svg { fill: #c9d1d9; }
  h1 {
    font-size: 22px;
    margin: 0;
    color: #f0f6fc;
  }
  .subtitle {
    color: #8b949e;
    font-size: 14px;
    margin-bottom: 30px;
  }
  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 16px;
  }
  label {
    font-size: 13px;
    font-weight: 600;
    color: #c9d1d9;
    display: block;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 8px 12px;
    background: #0d1117;
    color: #c9d1d9;
    border: 1px solid #30363d;
    border-radius: 6px;
    font-size: 14px;
    font-family: "SFMono-Regular", Consolas, monospace;
  }
  input:focus {
    outline: none;
    border-color: #58a6ff;
  }
  button {
    margin-top: 12px;
    padding: 6px 16px;
    background: #238636;
    color: #ffffff;
    border: 1px solid rgba(240,246,252,0.1);
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  button:hover { background: #2ea043; }
  button:disabled {
    background: #21262d;
    color: #8b949e;
    cursor: not-allowed;
  }
  #status {
    font-size: 13px;
    color: #8b949e;
    margin-top: 10px;
    font-family: "SFMono-Regular", Consolas, monospace;
  }
  #status.success { color: #3fb950; }
  #status.error { color: #f85149; }
  #answer {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 16px;
    margin-top: 14px;
    white-space: pre-wrap;
    font-size: 14px;
    line-height: 1.6;
    min-height: 24px;
    color: #c9d1d9;
  }
  .badge {
    display: inline-block;
    background: #1f6feb;
    color: white;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    margin-left: 8px;
    vertical-align: middle;
  }
</style>
</head>
<body>

  <div class="header">
    <svg height="28" viewBox="0 0 16 16" width="28">
      <path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path>
    </svg>
    <h1>RepoMind AI</h1>
    <span class="badge">RAG</span>
  </div>
  <p class="subtitle">Chat with any GitHub repository. Paste a URL, index it, then ask questions about the code.</p>

  <div class="card">
    <label>GITHUB REPOSITORY URL</label>
    <input id="repoUrl" placeholder="https://github.com/user/repo" />
    <button onclick="ingestRepo()" id="ingestBtn">Index Repository</button>
    <div id="status"></div>
  </div>

  <div class="card">
    <label>ASK A QUESTION</label>
    <input id="question" placeholder="e.g. What does this repo do? How is auth handled?" />
    <button onclick="askQuestion()" id="askBtn">Ask</button>
    <div id="answer"></div>
  </div>

<script>
const API_URL = "";

async function ingestRepo() {
  const repoUrl = document.getElementById("repoUrl").value;
  const status = document.getElementById("status");
  const btn = document.getElementById("ingestBtn");

  if (!repoUrl) { status.innerText = "Enter a repo URL first."; return; }

  btn.disabled = true;
  status.className = "";
  status.innerText = "⏳ Cloning, filtering, chunking, and embedding repo...";

  try {
    const res = await fetch(`${API_URL}/ingest`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ repo_url: repoUrl })
    });
    const data = await res.json();
    status.className = "success";
    status.innerText = `✓ ${data.message} — ${data.chunks} chunks indexed`;
  } catch (err) {
    status.className = "error";
    status.innerText = "✗ Failed to index repo. Check backend logs.";
  } finally {
    btn.disabled = false;
  }
}

async function askQuestion() {
  const repoUrl = document.getElementById("repoUrl").value;
  const question = document.getElementById("question").value;
  const answerBox = document.getElementById("answer");
  const btn = document.getElementById("askBtn");

  if (!repoUrl || !question) { answerBox.innerText = "Enter repo URL and a question first."; return; }

  btn.disabled = true;
  answerBox.innerText = "⏳ Thinking...";

  try {
    const res = await fetch(`${API_URL}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ repo_url: repoUrl, question: question })
    });
    const data = await res.json();
    answerBox.innerText = data.answer;
  } catch (err) {
    answerBox.innerText = "✗ Failed to get answer.";
  } finally {
    btn.disabled = false;
  }
}
</script>

</body>
</html>
